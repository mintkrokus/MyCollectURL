<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- PWA / 手機加入主畫面設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MyCollect">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    
    <title>Picki - 跨平台社群收藏</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 100: '#d4eaf7', 200: '#b6ccd8', 300: '#3b3c3d' },
                        accent: { 100: '#71c4ef', 200: '#00668c' },
                        text: { 100: '#1d1c1c', 200: '#313d44' },
                        bg: { 100: '#fffefb', 200: '#f5f4f1', 300: '#cccbc8' }
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'float': '0 10px 30px -5px rgba(0, 102, 140, 0.15)'
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: var(--bg-100, #fffefb);
            color: var(--text-100, #1d1c1c);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-nav {
            background: rgba(255, 254, 251, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(204, 203, 200, 0.3);
        }
        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -8px rgba(0, 102, 140, 0.15);
        }
        
        /* 隱藏捲軸但可捲動 */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Modal 動畫 */
        .modal-enter { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .modal-exit { animation: slideDown 0.2s ease-in forwards; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideDown { from { transform: translateY(0); opacity: 1; } to { transform: translateY(100%); opacity: 0; } }

        /* Toast 動畫 */
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, 20px); }
            15% { opacity: 1; transform: translate(-50%, 0); }
            85% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, -20px); }
        }
        .toast {
            animation: fadeInOut 3s ease-in-out forwards;
        }
    </style>
</head>
<body class="bg-bg-100 text-text-100 min-h-screen pb-24">

    <!-- 頂部導航 -->
    <nav class="glass-nav fixed top-0 w-full z-30 px-4 py-3 flex justify-between items-center transition-all">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-accent-100 to-accent-200 flex items-center justify-center text-white shadow-sm">
                <i data-lucide="bookmark" class="w-4 h-4"></i>
            </div>
            <select id="mainCategoryFilter" class="font-bold text-lg bg-transparent border-none outline-none text-text-100 focus:ring-0 cursor-pointer appearance-none" onchange="renderPosts()">
                <option value="all">所有收藏</option>
                <!-- Categories injected here -->
            </select>
            <i data-lucide="chevron-down" class="w-4 h-4 text-text-200 -ml-1"></i>
        </div>
        
        <div class="flex items-center gap-3">
            <!-- 新增：手動同步按鈕 -->
            <button onclick="syncFromCloud()" class="p-2 text-text-200 hover:text-accent-200 transition-colors bg-bg-200 rounded-full" title="手動同步">
                <i data-lucide="refresh-cw" class="w-5 h-5"></i>
            </button>
            <button onclick="openSearch()" class="p-2 text-text-200 hover:text-accent-200 transition-colors bg-bg-200 rounded-full">
                <i data-lucide="search" class="w-5 h-5"></i>
            </button>
            <button onclick="openSettings()" class="p-2 text-text-200 hover:text-accent-200 transition-colors bg-bg-200 rounded-full">
                <i data-lucide="settings" class="w-5 h-5"></i>
            </button>
        </div>
    </nav>

    <!-- 狀態列 (離線/同步中) -->
    <div id="syncStatus" class="fixed top-16 left-0 w-full z-20 text-center py-1 text-xs font-medium transition-all duration-300 hidden">
        狀態列
    </div>

    <!-- 主要內容區: 卡片網格 -->
    <main class="pt-20 px-4 max-w-5xl mx-auto">
        <!-- 搜尋列 (預設隱藏) -->
        <div id="searchBar" class="hidden mb-6 animate-[slideDown_0.2s_ease-out]">
            <div class="relative">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-text-200"></i>
                <input type="text" id="searchInput" placeholder="搜尋標題、作者或標籤..." class="w-full pl-10 pr-4 py-3 bg-bg-200 border-none rounded-xl focus:ring-2 focus:ring-accent-100 outline-none transition-shadow text-text-100 placeholder-text-200" oninput="renderPosts()">
            </div>
        </div>

        <div id="emptyState" class="hidden flex-col items-center justify-center py-20 text-center">
            <div class="w-20 h-20 mb-4 rounded-full bg-primary-100 flex items-center justify-center text-accent-200">
                <i data-lucide="inbox" class="w-10 h-10"></i>
            </div>
            <h3 class="text-lg font-bold text-text-100 mb-2">目前還沒有收藏喔！</h3>
            <p class="text-text-200 text-sm mb-6">點擊右下角的按鈕，貼上網址開始您的第一個收藏。</p>
        </div>

        <div id="postsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- 卡片由 JS 動態生成 -->
        </div>
    </main>

    <!-- 浮動新增按鈕 (FAB) -->
    <button onclick="openAddModal()" class="fixed bottom-6 right-6 w-14 h-14 bg-gradient-to-tr from-accent-200 to-accent-100 text-white rounded-full shadow-float flex items-center justify-center hover:scale-105 active:scale-95 transition-all z-20">
        <i data-lucide="plus" class="w-6 h-6"></i>
    </button>

    <!-- ==== 新增/編輯貼文 Modal ==== -->
    <div id="addModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 hidden flex-col justify-end sm:justify-center items-center p-0 sm:p-4 opacity-0 transition-opacity">
        <div class="bg-bg-100 w-full sm:max-w-lg rounded-t-3xl sm:rounded-2xl p-6 shadow-2xl modal-exit max-h-[90vh] overflow-y-auto hide-scrollbar" id="addModalContent">
            
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-text-100" id="modalTitle">新增收藏</h2>
                <button onclick="closeModal('addModal')" class="p-2 bg-bg-200 text-text-200 rounded-full hover:bg-bg-300">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <form id="addForm" class="space-y-4">
                <input type="hidden" id="postId">
                
                <!-- 網址 -->
                <div>
                    <label class="block text-sm font-medium text-text-200 mb-1">貼文網址 (必填)</label>
                    <div class="relative">
                        <input type="url" id="postUrl" required placeholder="https://..." class="w-full p-3 bg-bg-200 border-none rounded-xl focus:ring-2 focus:ring-accent-100 outline-none text-text-100" oninput="debounceFetchMetadata()">
                        <div id="loadingSpinner" class="absolute right-3 top-1/2 -translate-y-1/2 hidden">
                            <i data-lucide="loader-2" class="w-5 h-5 text-accent-100 animate-spin"></i>
                        </div>
                    </div>
                </div>

                <!-- 主分類 -->
                <div>
                    <label class="block text-sm font-medium text-text-200 mb-1">主分類</label>
                    <div class="flex gap-2">
                        <select id="postCategory" class="flex-1 p-3 bg-bg-200 border-none rounded-xl focus:ring-2 focus:ring-accent-100 outline-none text-text-100 appearance-none font-medium">
                            <!-- JS 注入 -->
                        </select>
                        <!-- 解決無法更改分類的關鍵：新增按鈕 -->
                        <button type="button" onclick="promptNewCategory()" class="px-4 bg-primary-100 text-accent-200 rounded-xl font-medium hover:bg-primary-200 transition-colors whitespace-nowrap shadow-sm">
                            + 新增
                        </button>
                    </div>
                </div>

                <!-- 標籤 -->
                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label class="block text-sm font-medium text-text-200">標籤 (用半形逗號分開)</label>
                        <button type="button" id="aiTagBtn" class="hidden text-xs bg-gradient-to-r from-accent-100 to-accent-200 text-white px-2 py-1 rounded-md shadow-sm items-center gap-1" onclick="applyAiTags()">
                            <i data-lucide="sparkles" class="w-3 h-3"></i> 智慧建議
                        </button>
                    </div>
                    <input type="text" id="postTags" placeholder="例如: AI, 設計, 待看" class="w-full p-3 bg-bg-200 border-none rounded-xl focus:ring-2 focus:ring-accent-100 outline-none text-text-100">
                </div>

                <!-- 展開檢視進階內容 -->
                <div class="border border-bg-300 rounded-xl overflow-hidden mt-4">
                    <button type="button" onclick="toggleAdvanced()" class="w-full p-3 bg-bg-200 flex justify-between items-center text-sm font-medium text-text-200 hover:bg-bg-300 transition-colors">
                        <span>展開檢視 / 編輯自動抓取內容</span>
                        <i data-lucide="chevron-down" id="advChevron" class="w-4 h-4 transition-transform"></i>
                    </button>
                    
                    <div id="advancedFields" class="hidden p-4 space-y-4 bg-bg-100">
                        <div>
                            <label class="block text-xs text-text-200 mb-1">收藏標題</label>
                            <input type="text" id="postTitle" class="w-full p-2 text-sm bg-bg-200 border-none rounded-lg focus:ring-1 focus:ring-accent-100 outline-none text-text-100">
                        </div>
                        <div>
                            <label class="block text-xs text-text-200 mb-1">作者帳號</label>
                            <input type="text" id="postAuthor" class="w-full p-2 text-sm bg-bg-200 border-none rounded-lg focus:ring-1 focus:ring-accent-100 outline-none text-text-100">
                        </div>
                        <div>
                            <label class="block text-xs text-text-200 mb-1">內文備忘</label>
                            <textarea id="postDesc" rows="3" class="w-full p-2 text-sm bg-bg-200 border-none rounded-lg focus:ring-1 focus:ring-accent-100 outline-none text-text-100"></textarea>
                        </div>
                    </div>
                </div>

                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="closeModal('addModal')" class="flex-1 p-3 bg-bg-200 text-text-200 font-bold rounded-xl hover:bg-bg-300 transition-colors">取消</button>
                    <button type="button" onclick="savePost()" class="flex-1 p-3 bg-accent-200 text-white font-bold rounded-xl hover:bg-accent-200/90 shadow-float transition-all">確認儲存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ==== 設定與同步 Modal ==== -->
    <div id="settingsModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 hidden flex-col justify-end sm:justify-center items-center p-0 sm:p-4 opacity-0 transition-opacity">
        <div class="bg-bg-100 w-full sm:max-w-md rounded-t-3xl sm:rounded-2xl p-6 shadow-2xl modal-exit max-h-[90vh] overflow-y-auto hide-scrollbar" id="settingsModalContent">
            
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-text-100">系統設定</h2>
                <button onclick="closeModal('settingsModal')" class="p-2 bg-bg-200 text-text-200 rounded-full hover:bg-bg-300">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <div class="space-y-6">
                <!-- 雲端同步設定 (改版) -->
                <div class="bg-primary-100/50 p-4 rounded-2xl border border-primary-200/50">
                    <div class="flex items-center gap-2 mb-2">
                        <div class="p-2 bg-white rounded-lg text-accent-200 shadow-sm"><i data-lucide="database" class="w-5 h-5"></i></div>
                        <h3 class="font-bold text-text-100">雲端資料庫綁定</h3>
                    </div>
                    <p class="text-xs text-text-200 mb-3">請輸入您部署的 Google Apps Script 網頁應用程式 URL，實現免登入的跨裝置同步。</p>
                    
                    <label class="block text-xs font-bold text-text-200 mb-1">API URL</label>
                    <input type="text" id="apiUrlInput" placeholder="https://script.google.com/macros/s/.../exec" class="w-full p-2 mb-3 bg-white border border-primary-200 rounded-lg text-sm focus:ring-2 focus:ring-accent-100 outline-none text-text-100">
                    
                    <button onclick="saveApiUrl()" class="w-full p-2.5 bg-accent-200 text-white rounded-lg font-bold text-sm hover:bg-accent-200/90 shadow-sm transition-all">
                        連結並同步資料庫
                    </button>
                </div>

                <!-- 資料管理 -->
                <div class="space-y-2">
                    <h3 class="font-bold text-text-100 text-sm px-1">資料管理</h3>
                    <button onclick="exportCSV()" class="w-full p-3 bg-bg-200 text-left rounded-xl flex items-center gap-3 hover:bg-bg-300 transition-colors">
                        <i data-lucide="download" class="w-4 h-4 text-text-200"></i>
                        <span class="text-sm font-medium">匯出為 CSV 備份</span>
                    </button>
                    <button onclick="clearAllData()" class="w-full p-3 bg-red-50 text-left rounded-xl flex items-center gap-3 hover:bg-red-100 transition-colors">
                        <i data-lucide="trash-2" class="w-4 h-4 text-red-500"></i>
                        <span class="text-sm font-medium text-red-600">清除所有資料 (重置)</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 初始化 Lucide Icons
        lucide.createIcons();

        // ==== 全域狀態 ====
        let posts = [];
        // 預設分類 (當本地與雲端都沒有時使用)
        let categories = ['未分類', '學習', '工作', '靈感', '待看']; 
        let apiUrl = localStorage.getItem('picki_api_url') || '';
        let aiSuggestedTags = [];
        let fetchTimeout;

        // ==== 啟動初始化 ====
        window.onload = async () => {
            loadLocalData();
            updateCategoryDropdowns();
            renderPosts();
            
            if (apiUrl) {
                await syncFromCloud();
            }
        };

        // ==== 資料讀取與儲存邏輯 ====
        function loadLocalData() {
            const savedPosts = localStorage.getItem('picki_posts');
            if (savedPosts) {
                posts = JSON.parse(savedPosts);
            } else {
                posts = []; // 徹底清空預設資料
            }

            const savedCategories = localStorage.getItem('picki_categories');
            if (savedCategories) {
                categories = JSON.parse(savedCategories);
            }
        }

        function saveLocalData() {
            localStorage.setItem('picki_posts', JSON.stringify(posts));
            localStorage.setItem('picki_categories', JSON.stringify(categories));
            updateCategoryDropdowns();
            renderPosts();
        }

        // ==== 雲端同步邏輯 (GAS API) ====
        async function syncFromCloud() {
            if (!apiUrl) return;
            showSyncStatus("🔄 同步中...", "bg-primary-100 text-accent-200");
            
            try {
                const response = await fetch(`${apiUrl}?action=read`);
                const result = await response.json();
                
                if (result.status === 'success' && result.data) {
                    // 解析從 GAS 來的 CSV-like 資料
                    if (result.data.length > 0) {
                        posts = result.data.map(row => ({
                            id: row.id,
                            url: row.url,
                            title: row.title,
                            author: row.author,
                            desc: row.desc,
                            category: row.category,
                            tags: row.tags ? row.tags.split(',') : [],
                            platform: row.platform,
                            timestamp: parseInt(row.timestamp)
                        }));
                    } else {
                        posts = [];
                    }
                    saveLocalData();
                    // 已把原本的綠色改為您指定的 Primary/Accent 配色
                    showSyncStatus("✅ 同步完成", "bg-primary-100 text-accent-200", 2000);
                }
            } catch (e) {
                console.error("Sync read error", e);
                // 失敗時改為灰色底色，避免破壞整體美感
                showSyncStatus("❌ 同步失敗，請檢查 API 網址", "bg-bg-300 text-text-100", 3000);
            }
        }

        async function syncToCloud() {
            if (!apiUrl) return;
            showSyncStatus("☁️ 儲存至雲端...", "bg-primary-100 text-accent-200");
            
            try {
                // 將 tags 陣列轉為字串以利儲存
                const dataToSave = posts.map(p => ({
                    ...p,
                    tags: p.tags.join(',')
                }));

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'save', data: dataToSave })
                });
                const result = await response.json();
                
                if (result.status === 'success') {
                    // 已把原本的綠色改為您指定的 Primary/Accent 配色
                    showSyncStatus("✅ 已儲存至雲端", "bg-primary-100 text-accent-200", 2000);
                }
            } catch (e) {
                console.error("Sync write error", e);
                showSyncStatus("❌ 雲端儲存失敗", "bg-bg-300 text-text-100", 3000);
            }
        }

        async function syncToCloud() {
            if (!apiUrl) return;
            showSyncStatus("☁️ 儲存至雲端...", "bg-primary-100 text-accent-200");
            
            try {
                // 將 tags 陣列轉為字串以利儲存
                const dataToSave = posts.map(p => ({
                    ...p,
                    tags: p.tags.join(',')
                }));

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'save', data: dataToSave })
                });
                const result = await response.json();
                
                if (result.status === 'success') {
                    showSyncStatus("✅ 已儲存至雲端", "bg-green-100 text-green-700", 2000);
                }
            } catch (e) {
                console.error("Sync write error", e);
                showSyncStatus("❌ 雲端儲存失敗", "bg-red-100 text-red-600", 3000);
            }
        }

        function showSyncStatus(msg, classes, timeout = 0) {
            const el = document.getElementById('syncStatus');
            el.className = `fixed top-0 left-0 w-full z-40 text-center py-2 text-xs font-bold transition-all duration-300 shadow-sm ${classes}`;
            el.textContent = msg;
            el.classList.remove('hidden');
            el.style.transform = 'translateY(0)';
            
            if (timeout > 0) {
                setTimeout(() => {
                    el.style.transform = 'translateY(-100%)';
                    setTimeout(() => el.classList.add('hidden'), 300);
                }, timeout);
            }
        }

        // ==== 分類管理 (解決無法選擇的問題) ====
        function updateCategoryDropdowns() {
            // 更新首頁過濾器
            const filter = document.getElementById('mainCategoryFilter');
            const currentFilterVal = filter.value;
            filter.innerHTML = '<option value="all">所有收藏</option>';
            categories.forEach(cat => {
                filter.innerHTML += `<option value="${cat}">${cat}</option>`;
            });
            if(categories.includes(currentFilterVal)) filter.value = currentFilterVal;

            // 更新新增貼文的下拉選單
            const postCat = document.getElementById('postCategory');
            const currentPostVal = postCat.value;
            postCat.innerHTML = '';
            categories.forEach(cat => {
                postCat.innerHTML += `<option value="${cat}">${cat}</option>`;
            });
            if(categories.includes(currentPostVal)) postCat.value = currentPostVal;
        }

        function promptNewCategory() {
            const newCat = prompt("請輸入新分類名稱：\n(例如：開發筆記、旅遊景點)");
            if (newCat && newCat.trim() !== '') {
                const cleanCat = newCat.trim();
                if (!categories.includes(cleanCat)) {
                    categories.push(cleanCat);
                    localStorage.setItem('picki_categories', JSON.stringify(categories));
                    updateCategoryDropdowns();
                    // 自動選擇剛新增的分類
                    document.getElementById('postCategory').value = cleanCat;
                    showToast(`已新增分類：${cleanCat}`);
                } else {
                    showToast("此分類已存在！");
                }
            }
        }

        // ==== 智慧抓取與社群平台解析 (解決 Threads 抓取錯誤) ====
        function debounceFetchMetadata() {
            const url = document.getElementById('postUrl').value;
            clearTimeout(fetchTimeout);
            document.getElementById('loadingSpinner').classList.remove('hidden');
            
            fetchTimeout = setTimeout(() => {
                if(url) fetchMetadata(url);
                else document.getElementById('loadingSpinner').classList.add('hidden');
            }, 800);
        }

        // 專門解析社群網址的自訂邏輯
        function extractPlatformInfo(url) {
            let platform = 'web';
            let author = null;
            let titleCleaner = null;

            try {
                const urlObj = new URL(url);
                const host = urlObj.hostname;
                const path = urlObj.pathname;

                if (host.includes('threads.net')) {
                    platform = 'threads';
                    const match = path.match(/\/@([a-zA-Z0-9_.-]+)/);
                    if (match) author = '@' + match[1];
                    titleCleaner = (title) => title.split(' on Threads')[0];
                } 
                else if (host.includes('instagram.com')) {
                    platform = 'instagram';
                    const match = path.match(/\/(p|reel)\/([a-zA-Z0-9_-]+)/);
                    if(match) author = 'Instagram Post'; // IG doesn't always put user in url easily
                }
                else if (host.includes('twitter.com') || host.includes('x.com')) {
                    platform = 'twitter';
                    const match = path.match(/\/([a-zA-Z0-9_.-]+)\/status/);
                    if (match) author = '@' + match[1];
                }
                else if (host.includes('facebook.com')) platform = 'facebook';
                else if (host.includes('youtube.com') || host.includes('youtu.be')) platform = 'youtube';
            } catch(e) { console.error("URL 解析錯誤", e); }

            return { platform, author, titleCleaner };
        }

        async function fetchMetadata(url) {
            try {
                const pInfo = extractPlatformInfo(url);
                
                // 呼叫 Microlink (通用抓取)
                const response = await fetch(`https://api.microlink.io?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                
                if (data.status === 'success') {
                    let title = data.data.title || '';
                    let desc = data.data.description || '';
                    // 如果 Microlink 抓到的作者是無效的，或是特定的字眼，就用我們自己解析的
                    let mlAuthor = data.data.author || data.data.publisher || '';
                    let author = pInfo.author || mlAuthor;
                    
                    if (pInfo.platform === 'threads' && (mlAuthor === 'Threads' || mlAuthor === '@Threads')) {
                        author = pInfo.author; // 強制替換為正確的 @帳號
                    }

                    // 清理標題贅字
                    if (pInfo.titleCleaner) {
                        title = pInfo.titleCleaner(title);
                        if (!title || title.trim() === '') title = `${author} 的貼文`;
                    }

                    document.getElementById('postTitle').value = title;
                    document.getElementById('postDesc').value = desc;
                    document.getElementById('postAuthor').value = author;

                    // AI 智慧標籤預測 (簡單關鍵字比對)
                    const textToAnalyze = (title + ' ' + desc).toLowerCase();
                    const tagRules = {
                        'ai': ['ai', '人工智慧', 'chatgpt', 'gemini', 'midjourney'],
                        '設計': ['design', 'ui', 'ux', '設計', 'figma', '排版'],
                        '開發': ['code', '程式', '前端', '後端', 'javascript', 'react', 'python', 'github'],
                        '生活': ['日常', '生活', '美食', '旅遊', 'vlog'],
                        '論文': ['paper', '論文', '研究', '期刊', '博士', '碩士']
                    };
                    
                    aiSuggestedTags = [];
                    for (const [tag, keywords] of Object.entries(tagRules)) {
                        if (keywords.some(kw => textToAnalyze.includes(kw))) {
                            aiSuggestedTags.push(tag);
                        }
                    }

                    const aiBtn = document.getElementById('aiTagBtn');
                    if (aiSuggestedTags.length > 0) {
                        aiBtn.classList.remove('hidden');
                        aiBtn.classList.add('flex');
                    } else {
                        aiBtn.classList.add('hidden');
                    }
                }
            } catch (error) {
                console.error("抓取失敗", error);
            } finally {
                document.getElementById('loadingSpinner').classList.add('hidden');
            }
        }

        function applyAiTags() {
            const input = document.getElementById('postTags');
            const currentTags = input.value.split(',').map(t => t.trim()).filter(t => t);
            
            aiSuggestedTags.forEach(tag => {
                if (!currentTags.includes(tag)) currentTags.push(tag);
            });
            
            input.value = currentTags.join(', ');
            document.getElementById('aiTagBtn').classList.add('hidden');
            showToast("✨ 已套用智慧標籤");
        }


        // ==== 貼文卡片渲染 ====
        function getPlatformIcon(url) {
            if(url.includes('threads.net')) return { icon: 'at-sign', color: 'bg-black text-white' };
            if(url.includes('twitter.com') || url.includes('x.com')) return { icon: 'twitter', color: 'bg-black text-white' };
            if(url.includes('instagram.com')) return { icon: 'instagram', color: 'bg-gradient-to-tr from-yellow-400 via-pink-500 to-purple-500 text-white' };
            if(url.includes('facebook.com')) return { icon: 'facebook', color: 'bg-blue-600 text-white' };
            if(url.includes('youtube.com') || url.includes('youtu.be')) return { icon: 'youtube', color: 'bg-red-600 text-white' };
            return { icon: 'link-2', color: 'bg-bg-300 text-text-200' };
        }

        function renderPosts() {
            const grid = document.getElementById('postsGrid');
            const emptyState = document.getElementById('emptyState');
            const filterCat = document.getElementById('mainCategoryFilter').value;
            const searchKeyword = document.getElementById('searchInput').value.toLowerCase();
            
            grid.innerHTML = '';
            
            let filteredPosts = posts.filter(post => {
                const matchCat = filterCat === 'all' || post.category === filterCat;
                const searchStr = `${post.title} ${post.author} ${post.tags.join(' ')}`.toLowerCase();
                const matchSearch = searchStr.includes(searchKeyword);
                return matchCat && matchSearch;
            });

            // 依照時間排序 (最新在最前)
            filteredPosts.sort((a, b) => b.timestamp - a.timestamp);

            if (filteredPosts.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
            } else {
                emptyState.classList.add('hidden');
                emptyState.classList.remove('flex');
                
                filteredPosts.forEach(post => {
                    const platform = getPlatformIcon(post.url);
                    const tagHTML = post.tags.map(tag => 
                        `<span class="px-2 py-1 bg-primary-100 text-accent-200 text-xs font-bold rounded-md">${tag}</span>`
                    ).join('');

                    const card = document.createElement('div');
                    card.className = "bg-bg-100 rounded-2xl p-5 border border-bg-300 shadow-soft card-hover relative group";
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-3">
                            <div class="${platform.color} w-8 h-8 rounded-full flex items-center justify-center shadow-sm">
                                <i data-lucide="${platform.icon}" class="w-4 h-4"></i>
                            </div>
                            <div class="flex gap-2 opacity-100 sm:opacity-0 sm:group-hover:opacity-100 transition-opacity">
                                <button onclick="editPost('${post.id}')" class="p-1.5 text-text-200 hover:text-accent-200 bg-bg-200 rounded-lg"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                                <button onclick="deletePost('${post.id}')" class="p-1.5 text-text-200 hover:text-red-500 bg-bg-200 rounded-lg"><i data-lucide="trash" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                        <a href="${post.url}" target="_blank" class="block mb-2 cursor-pointer">
                            <h3 class="font-bold text-text-100 text-lg leading-tight line-clamp-2 hover:text-accent-200 transition-colors">${post.title || '無標題'}</h3>
                        </a>
                        <p class="text-sm text-text-200 mb-3 font-medium">${post.author || '未知作者'}</p>
                        ${post.desc ? `<p class="text-xs text-text-200 mb-4 line-clamp-3 bg-bg-200/50 p-2 rounded-lg">${post.desc}</p>` : ''}
                        
                        <div class="flex flex-wrap gap-1.5 mt-auto pt-2 border-t border-bg-200">
                            ${tagHTML}
                            <span class="px-2 py-1 bg-bg-200 text-text-200 text-xs font-medium rounded-md ml-auto border border-bg-300">${post.category}</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });
                lucide.createIcons();
            }
        }

        // ==== CRUD 操作 ====
        function savePost() {
            const idInput = document.getElementById('postId').value;
            const url = document.getElementById('postUrl').value;
            
            if(!url) return alert('請輸入網址');

            const postData = {
                id: idInput || Date.now().toString(),
                url: url,
                category: document.getElementById('postCategory').value || '未分類',
                tags: document.getElementById('postTags').value.split(',').map(t=>t.trim()).filter(t=>t),
                title: document.getElementById('postTitle').value,
                author: document.getElementById('postAuthor').value,
                desc: document.getElementById('postDesc').value,
                timestamp: idInput ? posts.find(p=>p.id===idInput).timestamp : Date.now()
            };

            if (idInput) {
                const idx = posts.findIndex(p => p.id === idInput);
                posts[idx] = postData;
                showToast("更新成功！");
            } else {
                posts.push(postData);
                showToast("已加入收藏！");
            }

            saveLocalData();
            syncToCloud(); // 觸發背景同步
            closeModal('addModal');
        }

        function editPost(id) {
            const post = posts.find(p => p.id === id);
            if(post) {
                document.getElementById('postId').value = post.id;
                document.getElementById('postUrl').value = post.url;
                document.getElementById('postCategory').value = post.category;
                document.getElementById('postTags').value = post.tags.join(', ');
                document.getElementById('postTitle').value = post.title;
                document.getElementById('postAuthor').value = post.author;
                document.getElementById('postDesc').value = post.desc;
                
                document.getElementById('modalTitle').textContent = "編輯收藏";
                openAddModal(false); // 打開但不清空
                
                // 自動展開進階區
                const adv = document.getElementById('advancedFields');
                const chev = document.getElementById('advChevron');
                adv.classList.remove('hidden');
                chev.style.transform = 'rotate(180deg)';
            }
        }

        function deletePost(id) {
            if(confirm('確定要刪除這個收藏嗎？')) {
                posts = posts.filter(p => p.id !== id);
                saveLocalData();
                syncToCloud();
                showToast("已刪除收藏");
            }
        }

        // ==== UI 互動控制 ====
        function openAddModal(clear = true) {
            if(clear) {
                document.getElementById('addForm').reset();
                document.getElementById('postId').value = '';
                document.getElementById('modalTitle').textContent = "新增收藏";
                document.getElementById('aiTagBtn').classList.add('hidden');
                // 收起進階
                document.getElementById('advancedFields').classList.add('hidden');
                document.getElementById('advChevron').style.transform = 'rotate(0deg)';
            }
            showModal('addModal');
        }

        function toggleAdvanced() {
            const el = document.getElementById('advancedFields');
            const chev = document.getElementById('advChevron');
            if (el.classList.contains('hidden')) {
                el.classList.remove('hidden');
                chev.style.transform = 'rotate(180deg)';
            } else {
                el.classList.add('hidden');
                chev.style.transform = 'rotate(0deg)';
            }
        }

        function openSearch() {
            const bar = document.getElementById('searchBar');
            if(bar.classList.contains('hidden')) {
                bar.classList.remove('hidden');
                document.getElementById('searchInput').focus();
            } else {
                bar.classList.add('hidden');
                document.getElementById('searchInput').value = '';
                renderPosts();
            }
        }

        function showModal(id) {
            const modal = document.getElementById(id);
            const content = document.getElementById(id + 'Content');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('modal-exit');
                content.classList.add('modal-enter');
            }, 10);
        }

        function closeModal(id) {
            const modal = document.getElementById(id);
            const content = document.getElementById(id + 'Content');
            content.classList.remove('modal-enter');
            content.classList.add('modal-exit');
            setTimeout(() => {
                modal.classList.add('opacity-0');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    modal.classList.remove('flex');
                }, 200);
            }, 200);
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast fixed top-20 left-1/2 transform -translate-x-1/2 bg-text-100 text-bg-100 px-4 py-2 rounded-full shadow-float z-50 text-sm font-bold flex items-center gap-2';
            toast.innerHTML = `<i data-lucide="check-circle-2" class="w-4 h-4 text-accent-100"></i> ${message}`;
            document.body.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => toast.remove(), 3000);
        }

        // ==== 設定相關 ====
        function openSettings() {
            document.getElementById('apiUrlInput').value = apiUrl;
            showModal('settingsModal');
        }

        async function saveApiUrl() {
            const newUrl = document.getElementById('apiUrlInput').value.trim();
            if(newUrl) {
                apiUrl = newUrl;
                localStorage.setItem('picki_api_url', apiUrl);
                closeModal('settingsModal');
                showToast("API 綁定成功！開始同步...");
                await syncFromCloud(); // 綁定後立即把雲端資料抓下來蓋過本地
            } else {
                alert("請輸入有效的 API URL");
            }
        }

        function exportCSV() {
            if(posts.length === 0) return alert('目前沒有資料可匯出');
            
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; // Add BOM for Excel
            csvContent += "標題,網址,作者,分類,標籤,備註\n";
            
            posts.forEach(p => {
                const row = [
                    `"${(p.title||'').replace(/"/g, '""')}"`,
                    `"${p.url||''}"`,
                    `"${(p.author||'').replace(/"/g, '""')}"`,
                    `"${p.category||''}"`,
                    `"${p.tags.join(', ')}"`,
                    `"${(p.desc||'').replace(/"/g, '""')}"`
                ].join(',');
                csvContent += row + "\n";
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `MyCollect_Backup_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function clearAllData() {
            const confirmMsg = "警告：這將會清除您『瀏覽器上』的所有收藏資料！\n如果您有綁定雲端，建議先去 Google 試算表備份。\n\n確定要清除嗎？";
            if(confirm(confirmMsg)) {
                posts = [];
                categories = ['未分類', '學習', '工作', '靈感', '待看']; // 恢復預設分類
                apiUrl = '';
                localStorage.removeItem('picki_posts');
                localStorage.removeItem('picki_categories');
                localStorage.removeItem('picki_api_url');
                
                updateCategoryDropdowns();
                renderPosts();
                closeModal('settingsModal');
                showToast("資料已完全清除重置");
            }
        }
    </script>
</body>
</html>
